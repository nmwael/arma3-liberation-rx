version: '3.8'

services:
  arma3-liberation-rx:
    image: ghcr.io/parkervcp/games:arma3
    container_name: arma3-liberation-rx
    environment:
      - STEAM_USER=your_steam_username
      - STEAM_PASS=your_steam_password
      - SERVER_BINARY=arma3server_x64
      - SERVER_PORT=2302
      - MAX_PLAYERS=10
      - SERVER_PASSWORD=changeme
      - ADMIN_PASSWORD=admin123
      - UPDATE_SERVER=1
      - MOD_FILE=modlist.html
      - STARTUP_PARAMS=-noLogs
    ports:
      - "2302:2302/udp"   # Game
      - "2303:2303/udp"   # Steam Query
      - "2304:2304/udp"   # Steam Master
      - "2306:2306/udp"   # BattlEye
    volumes:
      - ./serverfiles:/home/container
    working_dir: /home/container
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
    stdin_open: true
    tty: true
